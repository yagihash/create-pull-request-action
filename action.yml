name: Create Pull Request
description: Create a pull request using a GitHub App token
inputs:
  token:
    description: GitHub App token with pull-requests:write permission
    required: true
  repository:
    description: Target repository (owner/repo)
    default: ${{ github.repository }}
  title:
    description: Pull request title
    required: true
  body:
    description: Pull request body (Markdown)
    default: ""
  head:
    description: Head branch name
    required: true
  base:
    description: Base branch name
    default: main
  reviewers:
    description: Comma-separated list of reviewer logins (optional)
    default: ""
  labels:
    description: Comma-separated list of labels (optional)
    default: ""
  draft:
    description: Create as draft PR
    default: "false"
outputs:
  pull-request-url:
    description: URL of the created or existing pull request
    value: ${{ steps.pr.outputs.pull_request_url }}
  pull-request-number:
    description: Number of the created or existing pull request
    value: ${{ steps.pr.outputs.pull_request_number }}
runs:
  using: composite
  steps:
    - name: Create pull request
      id: pr
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.token }}
        REPO: ${{ inputs.repository }}
        TITLE: ${{ inputs.title }}
        BODY: ${{ inputs.body }}
        HEAD: ${{ inputs.head }}
        BASE: ${{ inputs.base }}
        REVIEWERS: ${{ inputs.reviewers }}
        LABELS: ${{ inputs.labels }}
        DRAFT: ${{ inputs.draft }}
      run: |
        set -euo pipefail

        OWNER="${REPO%%/*}"

        # 1. Check for an existing open PR for the same head/base.
        EXISTING=$(gh api \
          "repos/${REPO}/pulls?head=${OWNER}:${HEAD}&base=${BASE}&state=open" \
          --jq '.[0] | {url: .html_url, number: .number} | select(.url != null)')

        if [[ -n "$EXISTING" ]]; then
          PR_URL=$(echo "$EXISTING" | jq -r '.url')
          PR_NUMBER=$(echo "$EXISTING" | jq -r '.number')
          {
            echo "pull_request_url=${PR_URL}"
            echo "pull_request_number=${PR_NUMBER}"
          } >> "$GITHUB_OUTPUT"
          echo "Existing pull request found: ${PR_URL}"
          exit 0
        fi

        # 2. Build the payload and create the PR.
        DRAFT_BOOL=$([[ "$DRAFT" == "true" ]] && echo true || echo false)
        RESULT=$(jq -n \
          --arg title "$TITLE" \
          --arg body "$BODY" \
          --arg head "$HEAD" \
          --arg base "$BASE" \
          --argjson draft "$DRAFT_BOOL" \
          '{title: $title, body: $body, head: $head, base: $base, draft: $draft}' | \
        gh api "repos/${REPO}/pulls" --input - \
          --jq '{url: .html_url, number: .number}')
        PR_URL=$(echo "$RESULT" | jq -r '.url')
        PR_NUMBER=$(echo "$RESULT" | jq -r '.number')
        echo "Created pull request: ${PR_URL}"

        # 3. Request reviews if reviewers are provided.
        if [[ -n "$REVIEWERS" ]]; then
          jq -Rn '[splits(",") | select(length > 0)]' <<< "$REVIEWERS" | \
          jq '{reviewers: .}' | \
          gh api "repos/${REPO}/pulls/${PR_NUMBER}/requested_reviewers" \
            --method POST --input -
        fi

        # 4. Add labels if labels are provided.
        if [[ -n "$LABELS" ]]; then
          jq -Rn '[splits(",") | select(length > 0)]' <<< "$LABELS" | \
          jq '{labels: .}' | \
          gh api "repos/${REPO}/issues/${PR_NUMBER}/labels" \
            --method POST --input -
        fi

        # 5. Output.
        {
          echo "pull_request_url=${PR_URL}"
          echo "pull_request_number=${PR_NUMBER}"
        } >> "$GITHUB_OUTPUT"
